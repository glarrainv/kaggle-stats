name: Update Kaggle Stats

on:
  schedule:
    - cron: 0 0 31 * *
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Fetch Kaggle stats
        run: node scripts/fetch.js

      - name: Render SVG cards
        run: node scripts/render.js

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/history/history.json assets/
          git diff --staged --quiet || \
          git commit -m "chore: update kaggle stats [skip ci]" && git push
