
[build]
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

[dev]
  framework = "#static"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["config.json"]

[[redirects]]
  from = "/card/:itemType/:username/:slug/svg"
  to = "/.netlify/functions/api/card/:itemType/:username/:slug/svg"
  status = 200

[[redirects]]
  from = "/badge/:itemType/:username/:slug/svg"
  to = "/.netlify/functions/api/badge/:itemType/:username/:slug/svg"
  status = 200

[[redirects]]
  from = "/card/*"
  to = "/item.html"
  status = 200

[[redirects]]
  from = "/badge/*"
  to = "/item.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
